# ---------------------------------------------------------------------------
# MLflow / DagShub connection
# ---------------------------------------------------------------------------
tracking:
  tracking_uri: "https://dagshub.com/Vinayakmane47/NYC-YELLOW-TAXI-MLOPS.mlflow/"
  username: "Vinayakmane47"
  repo_name: "NYC-YELLOW-TAXI-MLOPS"
  token_env_key: "DAGSHUB_TOKEN"
  env_file_path: ".env"

# ---------------------------------------------------------------------------
# Data loading
# ---------------------------------------------------------------------------
data:
  train_path: "ml_transformed/train.parquet"
  val_path: "ml_transformed/val.parquet"
  test_path: "ml_transformed/test.parquet"
  target_col: "trip_duration_min"
  trained_on_range: "2023-01 to 2025-12"
  max_rows_train: 100000
  max_rows_val: 30000
  max_rows_test: 30000
  sample_fraction: null

# ---------------------------------------------------------------------------
# Stage 1 (screening)
# - Fast filter stage with capped data before expensive HPO
# ---------------------------------------------------------------------------
screening:
  top_n_for_hpo: 2
  row_cap_train: 20000
  row_cap_val: 10000

# ---------------------------------------------------------------------------
# Promotion policy used in model_evaluation.py
# ---------------------------------------------------------------------------
evaluation:
  min_rmse_improvement: 0.0
  max_mae_regression: 0.0
  max_r2_regression: 0.0

# ---------------------------------------------------------------------------
# Stage 2 (HPO + final model artifact)
# ---------------------------------------------------------------------------
training:
  n_trials_per_model: 50
  cv_folds: 3
  random_state: 42
  champion_config_path: "src/hpo/champion.json"
  metric_thresholds:
    min_r2: 0.3
    max_rmse: 30.0
    max_mae: 20.0

# ---------------------------------------------------------------------------
# HPO-eligible models (tuned with Optuna in stage 2)
# ---------------------------------------------------------------------------
models_to_train:
  - name: lightgbm
    enabled: true
    screening_fixed_params:
      n_estimators: 200
      learning_rate: 0.1
      num_leaves: 31
      max_depth: -1
      n_jobs: -1
      verbosity: -1
    search_space:
      n_estimators: { type: int, low: 200, high: 1200 }
      learning_rate: { type: float, low: 0.01, high: 0.2, log: true }
      num_leaves: { type: int, low: 15, high: 255 }
      max_depth: { type: int, low: 3, high: 14 }
      min_child_samples: { type: int, low: 10, high: 120 }
      subsample: { type: float, low: 0.6, high: 1.0 }
      colsample_bytree: { type: float, low: 0.6, high: 1.0 }
      reg_alpha: { type: float, low: 0.000001, high: 10.0, log: true }
      reg_lambda: { type: float, low: 0.000001, high: 10.0, log: true }
    fixed_params:
      n_jobs: -1
      verbosity: -1

  - name: random_forest
    enabled: true
    screening_fixed_params:
      n_estimators: 120
      max_depth: 12
      min_samples_split: 4
      min_samples_leaf: 2
      max_features: 0.7
      n_jobs: -1
    search_space:
      n_estimators: { type: int, low: 200, high: 1000 }
      max_depth: { type: int, low: 4, high: 30 }
      min_samples_split: { type: int, low: 2, high: 30 }
      min_samples_leaf: { type: int, low: 1, high: 15 }
      max_features: { type: float, low: 0.3, high: 1.0 }
    fixed_params:
      n_jobs: -1

  - name: extra_trees
    enabled: true
    screening_fixed_params:
      n_estimators: 120
      max_depth: 12
      n_jobs: -1
    search_space:
      n_estimators: { type: int, low: 200, high: 1000 }
      max_depth: { type: int, low: 4, high: 30 }
      min_samples_split: { type: int, low: 2, high: 30 }
      min_samples_leaf: { type: int, low: 1, high: 15 }
      max_features: { type: float, low: 0.3, high: 1.0 }
    fixed_params:
      n_jobs: -1

# ---------------------------------------------------------------------------
# All screening models (stage 1 - ranked by val RMSE, top N sent to HPO)
# ---------------------------------------------------------------------------
screening_models:
  - name: lightgbm
    enabled: true
    fixed_params:
      n_estimators: 200
      learning_rate: 0.1
      num_leaves: 31
      max_depth: -1
      n_jobs: -1
      verbosity: -1

  - name: random_forest
    enabled: true
    fixed_params:
      n_estimators: 120
      max_depth: 12
      min_samples_split: 4
      min_samples_leaf: 2
      max_features: 0.7
      n_jobs: -1

  - name: extra_trees
    enabled: true
    fixed_params:
      n_estimators: 120
      max_depth: 12
      n_jobs: -1

  - name: gradient_boosting
    enabled: true
    fixed_params:
      n_estimators: 100
      max_depth: 5

  - name: hist_gradient_boosting
    enabled: true
    fixed_params:
      max_iter: 200
      max_depth: 8

  - name: ridge
    enabled: true
    fixed_params: {}

  - name: lasso
    enabled: true
    fixed_params: {}

  - name: elasticnet
    enabled: true
    fixed_params: {}

  - name: decision_tree
    enabled: true
    fixed_params:
      max_depth: 10

  - name: adaboost
    enabled: true
    fixed_params:
      n_estimators: 100
